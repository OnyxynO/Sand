# Override de production — fusionner avec le compose de base :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Ce fichier :
#   - Remplace nginx par une image multi-stage (React builte + nginx)
#   - Port 80 géré par Caddy (reverse proxy hôte) — nginx accessible sur 127.0.0.1:8080
#   - Passe APP_ENV=production sur app et queue
#   - Desactive les services dev (frontend Vite, mock-rh) via profils

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    volumes:
      - ./docker/nginx/prod:/etc/nginx/conf.d:ro

  app:
    environment:
      APP_ENV: production

  queue:
    environment:
      APP_ENV: production

  # Service Vite dev — desactive en production (demarrage uniquement avec --profile dev)
  frontend:
    profiles:
      - dev

  # Mock API RH — desactive en production
  mock-rh:
    profiles:
      - dev
