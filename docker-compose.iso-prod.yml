# ISO-PROD — remplace docker-compose.prod.yml pour les tests locaux (workflow 2 fichiers)
#
# IMPORTANT : ce fichier est utilisé à la place de docker-compose.prod.yml, pas en plus.
# Le watcher doit utiliser les mêmes 2 fichiers que le démarrage pour que les containers
# redémarrent avec les bonnes variables d'environnement.
#
# Différences avec docker-compose.prod.yml :
#   - nginx exposé sur 127.0.0.1:8090 (Caddy absent)
#   - /api/wake proxié par nginx → host.docker.internal:8082 (sand-watcher sur l'hôte)
#   - VITE_WAKE_TOKEN passé via --build-arg
#   - Overrides explicites DB_HOST=db, REDIS_HOST=redis (car .env local pointe sur 127.0.0.1)
#
# Terminal 1 — sand-watcher :
#   cd "/Users/seb/Documents/Claude projet/sand"
#   WAKE_TOKEN=test123 COMPOSE_FILE="$(pwd)/docker-compose.yml" COMPOSE_PROD_FILE="$(pwd)/docker-compose.iso-prod.yml" bun watcher/wake-server.ts
#
# Terminal 2 — démarrage :
#   VITE_WAKE_TOKEN=test123 docker compose -f docker-compose.yml -f docker-compose.iso-prod.yml up -d --build
#
# Accès : http://localhost:8090
#
# Simuler l'arrêt du backend (nginx reste UP pour servir le SPA) :
#   docker compose -f docker-compose.yml -f docker-compose.iso-prod.yml stop app queue db redis
#
# Vérifier le réveil :
#   1. Stopper le backend (commande ci-dessus)
#   2. Recharger http://localhost:8090 → ServiceWaitingPage
#   3. DevTools > Network : polling /api/health toutes les 3s
#   4. Après ~30s : requête GET /api/wake avec header X-Wake-Token: test123
#   5. Watcher (terminal 1) log "docker compose up -d OK"
#   6. Après ~40s : /api/health revient à 200 JSON → page d'attente disparaît

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.iso-prod
      args:
        VITE_WAKE_TOKEN: ${VITE_WAKE_TOKEN:-}
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./docker/nginx/iso-prod:/etc/nginx/conf.d:ro

  # Overrides pour que le backend pointe vers les services Docker (pas 127.0.0.1)
  # et reproduise la config prod (redis pour sessions/cache/queue)
  app:
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_SECURE_COOKIE: "false"
      APP_URL: http://localhost:8090
      SANCTUM_STATEFUL_DOMAINS: localhost:8090

  queue:
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      APP_URL: http://localhost:8090

  # Services dev désactivés (identique à docker-compose.prod.yml)
  frontend:
    profiles:
      - dev

  mock-rh:
    profiles:
      - dev
