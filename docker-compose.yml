services:
  # Application PHP (Laravel)
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sand-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sand-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Worker de file d'attente Laravel (traitement des exports CSV)
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sand-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sand-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90

  # Serveur Web Nginx
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: sand-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - sand-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: sand-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sand}
      POSTGRES_USER: ${DB_USERNAME:-sand}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    # Port non exposé sur l'hôte — accès via docker-compose.override.yml en dev
    volumes:
      - sand-db-data:/var/lib/postgresql/data
    networks:
      - sand-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sand} -d ${DB_DATABASE:-sand}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: sand-redis
    restart: unless-stopped
    # Port non exposé sur l'hôte — accès via docker-compose.override.yml en dev
    volumes:
      - sand-redis-data:/data
    networks:
      - sand-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Frontend React — serveur de développement Vite (HMR activé, pas un build de production)
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: sand-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - sand-network
    command: npm run dev -- --host
    depends_on:
      - nginx

  # Mock API RH (développement)
  mock-rh:
    image: node:20-alpine
    container_name: sand-mock-rh
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./docker/mock-rh:/app
    networks:
      - sand-network
    command: node server.js
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sand-network:
    driver: bridge

volumes:
  sand-db-data:
  sand-redis-data:
  frontend-node-modules:
