"Projet"
type Project {
    "Identifiant unique"
    id: ID!
    "Nom du projet"
    nom: String!
    "Code court unique"
    code: String!
    "Description du projet"
    description: String
    "Date de debut du projet"
    dateDebut: Date @rename(attribute: "date_debut")
    "Date de fin du projet"
    dateFin: Date @rename(attribute: "date_fin")
    "Indique si le projet est actif"
    estActif: Boolean! @rename(attribute: "est_actif")
    "Date de creation"
    createdAt: DateTime! @rename(attribute: "created_at")
    "Date de derniere modification"
    updatedAt: DateTime! @rename(attribute: "updated_at")

    "Utilisateurs affectes au projet"
    utilisateurs: [User!]! @belongsToMany(relation: "utilisateurs")

    "Moderateurs du projet"
    moderateurs: [User!]! @belongsToMany(relation: "moderateurs")

    "Activites explicitement activees sur ce projet"
    activitesActives: [Activity!]! @belongsToMany(relation: "activitesActives")

    "Saisies sur ce projet"
    saisies(
        dateDebut: Date @where(key: "date", operator: ">=")
        dateFin: Date @where(key: "date", operator: "<=")
    ): [TimeEntry!]! @hasMany(relation: "saisies")

    "Temps total sur une periode"
    tempsTotal(dateDebut: Date!, dateFin: Date!): Float! @field(resolver: "App\\GraphQL\\Resolvers\\ProjectResolver@tempsTotal")
}
