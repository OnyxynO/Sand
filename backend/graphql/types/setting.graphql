"Parametre systeme"
type Setting {
    "Identifiant unique"
    id: ID!
    "Cle unique du parametre"
    cle: String!
    "Valeur du parametre (JSON)"
    valeur: JSON!
    "Description du parametre"
    description: String
    "Date de creation"
    createdAt: DateTime! @rename(attribute: "created_at")
    "Date de derniere modification"
    updatedAt: DateTime! @rename(attribute: "updated_at")
}
