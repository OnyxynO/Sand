extend type Mutation {
    "Connexion"
    login(input: LoginInput! @spread): AuthPayload!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutator@login")

    "Deconnexion"
    logout: Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutator@logout")
        @guard

    "Demande de reinitialisation de mot de passe (envoi d'un email avec lien)"
    demanderReinitialisationMdp(input: DemanderReinitialisationMdpInput! @spread): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutator@demanderReinitialisationMdp")

    "Reinitialisation du mot de passe via le token recu par email"
    reinitialiserMdp(input: ReinitialisationMdpInput! @spread): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutator@reinitialiserMdp")
}
