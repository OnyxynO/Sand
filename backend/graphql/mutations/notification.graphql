extend type Mutation {
    "Marquer une notification comme lue"
    markNotificationRead(id: ID!): Notification!
        @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutator@markRead")
        @guard

    "Marquer toutes les notifications comme lues"
    markAllNotificationsRead: Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutator@markAllRead")
        @guard

    "Supprimer une notification"
    deleteNotification(id: ID!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutator@delete")
        @guard

    "Supprimer toutes les notifications"
    deleteAllNotifications: Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutator@deleteAll")
        @guard
}
