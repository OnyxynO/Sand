"Donnees d'une saisie de temps"
input TimeEntryInput {
    projetId: ID! @rename(attribute: "project_id") @rules(apply: ["required", "exists:projects,id"])
    activiteId: ID! @rename(attribute: "activity_id") @rules(apply: ["required", "exists:activities,id"])
    date: Date! @rules(apply: ["required"])
    duree: Float! @rules(apply: ["required", "numeric", "min:0.01", "max:1"])
    commentaire: String @rules(apply: ["max:1000"])
    "Utilisateur cible (moderateurs/admins uniquement)"
    userId: ID @rename(attribute: "user_id") @rules(apply: ["exists:users,id"])
}

"Mise a jour en lot"
input BulkUpdateEntry {
    id: ID! @rules(apply: ["required", "exists:time_entries,id"])
    duree: Float! @rules(apply: ["required", "numeric", "min:0.01", "max:1"])
    commentaire: String @rules(apply: ["max:1000"])
}
