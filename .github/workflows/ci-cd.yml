name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Tests backend PHP (Laravel + PostgreSQL ltree)
  # ─────────────────────────────────────────────
  tests-backend:
    name: Tests backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sand_test
          POSTGRES_USER: sand
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip, redis
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Installer les dependances Composer
        working-directory: backend
        run: composer install --optimize-autoloader

      - name: Activer l'extension ltree sur la base de test
        run: PGPASSWORD=secret psql -h 127.0.0.1 -U sand -d sand_test -c "CREATE EXTENSION IF NOT EXISTS ltree;"

      - name: Configurer le .env CI
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Patcher phpunit.xml pour CI (DB_HOST db -> 127.0.0.1)
        working-directory: backend
        run: |
          sed -i 's|<env name="DB_HOST" value="db"/>|<env name="DB_HOST" value="127.0.0.1"/>|' phpunit.xml

      - name: Migrations sur la base de test
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: sand_test
          DB_USERNAME: sand
          DB_PASSWORD: secret
        run: php artisan migrate --env=testing --force

      - name: Lancer PHPUnit
        working-directory: backend
        run: php artisan test

  # ─────────────────────────────────────────────
  # Tests frontend (Vitest)
  # ─────────────────────────────────────────────
  tests-frontend:
    name: Tests frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dependances npm
        working-directory: frontend
        run: npm ci

      - name: Lancer Vitest
        working-directory: frontend
        run: npm run test:run

  # ─────────────────────────────────────────────
  # Deploiement VPS (uniquement sur push main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploiement production
    needs: [tests-backend, tests-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/sand
            git pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T app \
              php artisan migrate --force
