# Conf nginx ISO-PROD — identique à docker/nginx/prod/app.conf avec une différence :
# /api/wake est proxié vers host.docker.internal:8082 (sand-watcher sur l'hôte Mac)
# car Caddy n'est pas présent dans l'environnement iso-prod local.
#
# En prod réelle : Caddy intercepte /api/wake AVANT nginx et le route vers sand-watcher.
# Ici nginx joue ce rôle de routeur pour /api/wake.

map $request_method $rate_limit_key {
    OPTIONS "";
    default $binary_remote_addr;
}
limit_req_zone $rate_limit_key zone=graphql:10m rate=300r/m;

server {
    listen 80;
    server_name localhost;

    # Resolver DNS interne Docker — force la re-résolution de app:9000 à chaque requête.
    # Sans ça, nginx cache l'IP au démarrage et perd la connexion si le container app
    # redémarre avec une nouvelle IP (comportement lors d'un wake-up).
    resolver 127.0.0.11 valid=5s;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 40M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # /api/wake — proxié vers sand-watcher sur l'hôte Mac (simule le routage Caddy)
    # location = (exact match) est prioritaire sur location ~ (regex) ci-dessous
    location = /api/wake {
        proxy_pass http://host.docker.internal:8082/wake;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # proxy_pass transmet tous les headers de la requête (dont X-Wake-Token) — pas de config nécessaire
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # GraphQL : rate limiting anti brute-force
    location = /graphql {
        limit_req zone=graphql burst=10 nodelay;
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Routes Laravel : API REST, Sanctum CSRF, GraphiQL
    location ~ ^/(api|sanctum|graphiql) {
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Assets statiques React (noms hachés par Vite) — cache long terme
    location ~* \.(js|css|woff|woff2|ttf|svg|ico|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — toutes les routes React → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
