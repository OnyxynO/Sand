# Rate limiting GraphQL — exclure les preflights CORS (OPTIONS) pour eviter les NetworkError
# Le navigateur envoie OPTIONS avant chaque POST quand max_age=0 ; les limiter casse CORS.
map $request_method $rate_limit_key {
    OPTIONS "";                   # Pas de limite pour les preflights
    default $binary_remote_addr;  # Limite par IP pour les vraies requetes
}
limit_req_zone $rate_limit_key zone=graphql:10m rate=30r/m;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Taille maximale des uploads
    client_max_body_size 40M;

    # Headers de securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
    # Activer uniquement si HTTPS est configure :
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Endpoint health : acces restreint au reseau Docker interne
    location = /api/health {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # GraphQL : rate limiting anti brute-force
    location = /graphql {
        limit_req zone=graphql burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Gestion des requetes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Interdire l'acces aux fichiers caches
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache des assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
