# Rate limiting GraphQL — exclure les preflights CORS (OPTIONS) pour eviter les NetworkError
map $request_method $rate_limit_key {
    OPTIONS "";                   # Pas de limite pour les preflights
    default $binary_remote_addr;  # Limite par IP pour les vraies requetes
}
limit_req_zone $rate_limit_key zone=graphql:10m rate=300r/m;

server {
    listen 80;
    server_name localhost;

    # React SPA — fichiers statiques buildes par Vite
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 40M;

    # Headers de securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # GraphQL : rate limiting anti brute-force
    location = /graphql {
        limit_req zone=graphql burst=10 nodelay;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Routes Laravel : API REST, Sanctum CSRF, GraphiQL
    location ~ ^/(api|sanctum|graphiql) {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Assets statiques React (noms haches par Vite) — cache long terme
    location ~* \.(js|css|woff|woff2|ttf|svg|ico|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — toutes les routes React → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Interdire l'acces aux fichiers caches
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
